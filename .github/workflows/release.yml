name: Release

# Push a version tag to build and publish a release:
#   git tag v1.2.3 && git push origin v1.2.3
#
# Builds Histshot for both Windows architectures (x64 and arm64) and publishes them to a single
# GitHub release. Each architecture is its own Velopack channel (win-x64 / win-arm64) with its own
# Setup.exe and its own update chain, so an x64 user only ever updates to x64 builds and an arm64
# user only to arm64 builds. The in-app updater reads the channel recorded at install time, so no
# code change is needed to keep the two chains separate.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub release and upload assets

jobs:
  release:
    runs-on: windows-latest
    strategy:
      # Serialize the two architectures: both jobs publish into the SAME release via --merge, and
      # running them concurrently would race on reading/writing that release's assets. The first job
      # creates the release; the second merges its assets in.
      max-parallel: 1
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            channel: win-x64
          - rid: win-arm64
            channel: win-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        shell: bash
        # Strip the leading "v": refs/tags/v1.2.3 -> 1.2.3
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        # Self-contained so end users don't need the .NET runtime installed. The version is forced
        # to match the tag so the updater compares correctly against the release.
        run: >
          dotnet publish src/Histshot/Histshot.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous releases (for delta packages)
        # Pulls prior packages of THIS channel so vpk can build small delta updates. Harmless when
        # the channel has no previous release yet.
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --channel ${{ matrix.channel }}

      - name: Pack
        run: >
          vpk pack
          --packId Histshot
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish
          --mainExe Histshot.exe
          --packTitle Histshot
          --icon src/Histshot/Assets/app-dark.ico
          --runtime ${{ matrix.rid }}
          --channel ${{ matrix.channel }}

      - name: Upload to GitHub Releases
        # --merge lets the second architecture add its assets to the release created by the first.
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --releaseName "Histshot ${{ steps.version.outputs.version }}"
          --tag ${{ github.ref_name }}
          --outputDir Releases
          --channel ${{ matrix.channel }}
          --merge
