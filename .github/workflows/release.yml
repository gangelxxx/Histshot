name: Release

# Push a version tag to build and publish a release:
#   git tag v1.2.3 && git push origin v1.2.3
# The job derives the version from the tag, publishes a self-contained Windows build, then uses
# Velopack to produce the update package + Histshot-win-Setup.exe and uploads both to the GitHub
# release. The in-app updater reads from this same Releases page.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub release and upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        shell: bash
        # Strip the leading "v": refs/tags/v1.2.3 -> 1.2.3
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        # Self-contained so end users don't need the .NET runtime installed. The version is forced
        # to match the tag so the updater compares correctly against the release.
        run: >
          dotnet publish src/Histshot/Histshot.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous releases (for delta packages)
        # Lets vpk build small delta updates against prior releases. Harmless on the first release.
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack
        run: >
          vpk pack
          --packId Histshot
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish
          --mainExe Histshot.exe
          --packTitle Histshot
          --icon src/Histshot/Assets/app-dark.ico

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --releaseName "Histshot ${{ steps.version.outputs.version }}"
          --tag ${{ github.ref_name }}
          --outputDir Releases
          --merge
